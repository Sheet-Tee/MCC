<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Sheet-Tee Golf</title>
    <script src="config.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #1a4a2e; font-family: Georgia, serif; color: #f0ead6; line-height: 1.4; }
        .gold { color: #d4af37; }
        .nav-bar { display: flex; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(212,175,55,0.3); position: sticky; top: 0; z-index: 100; }
        .nav-btn { flex: 1; padding: 16px; text-align: center; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: rgba(240,234,214,0.4); border-bottom: 2px solid transparent; cursor: pointer; }
        .nav-btn.active { color: #d4af37; border-bottom: 2px solid #d4af37; background: rgba(255,255,255,0.02); }
        .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(212,175,55,0.15); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .btn-action { background: #d4af37; color: #1a4a2e; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(212,175,55,0.1); }
        .checkbox { width: 22px; height: 22px; accent-color: #d4af37; }
        .login-wrap { height: 100vh; display: flex; flexDirection: column; justify-content: center; padding: 40px; text-align: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);

        function App() {
            const [isAuth, setIsAuth] = useState(localStorage.getItem("st_auth") === "true");
            const [pass, setPass] = useState("");
            const [view, setView] = useState("signup");
            const [roster, setRoster] = useState([]);
            const [signups, setSignups] = useState({});

            useEffect(() => {
                if (isAuth) {
                    fetchData();
                    const sub = sb.channel('any').on('postgres_changes',{event:'*',schema:'public',table:'store'}, fetchData).subscribe();
                    return () => sb.removeChannel(sub);
                }
            }, [isAuth]);

            const fetchData = async () => {
                const { data } = await sb.from('store').select('*');
                const rosterData = data.find(d => d.key === 'roster')?.value || [];
                const signupData = data.find(d => d.key === 'signups')?.value || {};
                setRoster(rosterData);
                setSignups(signupData);
            };

            const toggleSignup = async (name, day) => {
                const newSignups = { ...signups };
                if (!newSignups[day]) newSignups[day] = [];
                if (newSignups[day].includes(name)) {
                    newSignups[day] = newSignups[day].filter(n => n !== name);
                } else {
                    newSignups[day].push(name);
                }
                await sb.from('store').upsert({ key: 'signups', value: newSignups });
            };

            if (!isAuth) {
                return (
                    <div className="login-wrap">
                        <img src={CONFIG.logoUrl} style={{width:100, marginBottom:20}} />
                        <h1 style={{fontSize:26}}>{CONFIG.clubName}</h1>
                        <p className="gold" style={{fontSize:11, letterSpacing:2, marginBottom:30}}>{CONFIG.tagline}</p>
                        <input type="password" placeholder="Group Password" style={{background:'rgba(255,255,255,0.05)', border:'1px solid #d4af37', padding:15, borderRadius:8, color:'#fff', width:'100%', textAlign:'center', marginBottom:15}} 
                               onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter' && pass.toLowerCase() === CONFIG.groupPassword.toLowerCase() && (localStorage.setItem("st_auth","true"), setIsAuth(true))} />
                        <button className="btn-action" onClick={() => pass.toLowerCase() === CONFIG.groupPassword.toLowerCase() ? (localStorage.setItem("st_auth","true"), setIsAuth(true)) : alert("Wrong Password")}>Unlock Clubhouse</button>
                    </div>
                );
            }

            return (
                <div style={{maxWidth:500,
